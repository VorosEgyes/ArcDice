name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel any in-flight run for the same ref when a new commit arrives.
concurrency:
  group: build-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Host-native unit tests run first (fast, no AVR toolchain needed).
  # If these fail, the AVR build is skipped — saves CI minutes and
  # surfaces the regression faster.
  test-native:
    name: Host unit tests (native)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run native unit tests
        run: pio test -e native

  build-attiny13a:
    name: Build attiny13a firmware
    runs-on: ubuntu-latest
    needs: test-native

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/packages
            ~/.platformio/platforms
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini', 'src/**', 'include/**', 'lib/**', 'test/**') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Show PlatformIO version
        run: pio --version

      - name: Build firmware (attiny13a)
        run: pio run -e attiny13a

      - name: Check firmware size against ATtiny13A flash budget
        run: |
          set -e
          ELF=".pio/build/attiny13a/firmware.elf"
          if [ ! -f "$ELF" ]; then
            echo "::error::ELF not found at $ELF"
            exit 1
          fi
          FLASH_BYTES=$(pio run -e attiny13a -t size 2>/dev/null | grep -E "^\s*\.text\s+" | awk '{print $4}' | head -n1)
          echo "Firmware .text size: ${FLASH_BYTES} bytes"
          # ATtiny13A has 1024 bytes of flash for program memory.
          if [ -n "$FLASH_BYTES" ] && [ "$FLASH_BYTES" -gt 1024 ]; then
            echo "::error::Firmware .text is ${FLASH_BYTES} bytes, exceeds ATtiny13A flash (1024 bytes)"
            exit 1
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: arcdice-attiny13a-firmware
          path: |
            .pio/build/attiny13a/firmware.hex
            .pio/build/attiny13a/firmware.elf
          if-no-files-found: error
          retention-days: 14