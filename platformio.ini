; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:attiny13a]
platform = atmelavr
board = attiny13a
framework = arduino
upload_protocol = usbasp

; Native host environment for unit tests. The dice face-mapping logic
; (include/dice.h) is pure C++ with no AVR-specific includes, so we can
; compile and run it on the host without an AVR toolchain. This is what
; GitHub Actions calls via `pio test -e native`.
[env:native]
platform = native
build_flags = -std=c++17 -Wall -Wextra -Wpedantic